#version: '3.8'
services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "YdzjUirCSduCQOGbvOpuAA"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  mysql:
    image: mysql:latest
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: trip_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphql-gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVICES_USER_URL=http://user-service:8081
      - SERVICES_TRIP_URL=http://trip-service:8082
      - SERVICES_BOOKING_URL=http://booking-service:8083
    depends_on:
      - user-service
      - trip-service
      - booking-service

    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  # Заглушка для User Service
  user-service:
    image: wiremock/wiremock:latest
    ports:
      - "8081:8080"
    command: >
      --global-response-templating
    volumes:
      - ./stubs/user:/home/wiremock

  # Заглушка для Trip Service
  trip-service:
    image: wiremock/wiremock:latest
    ports:
      - "8082:8080"
    volumes:
      - ./stubs/trip:/home/wiremock

  # Заглушка для Booking Service
  booking-service:
    image: wiremock/wiremock:latest
    ports:
      - "8083:8080"
    volumes:
      - ./stubs/booking:/home/wiremock


volumes:
  mysql_data: